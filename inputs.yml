version: 3

app:
  name: Marine Guardian Enterprise
  slug: marine-guardian-enterprise
  description: >
    Multi-tenant digital platform enabling LGUs to centrally manage fisherfolk
    registrations, vessels, permits, catch monitoring, government programs, and
    marine enforcement. Blue Alliance (BA) provides independent enforcement
    operations and cross-LGU oversight via a consolidated analytics dashboard.
  local_port: 3000

tenancy:
  mode: multi
  routing: subdirectory
  slug_field: slug
  slug_immutable: true
  tenant_types:
    - LGU
    - BlueAlliance
  shared_global_data:
    - entity: Species
      access: read_only_all_tenants
    - entity: Tenant
      access: middleware_slug_resolution_only

domains:
  dev: "http://localhost:3000"
  stage: "https://stage.marine-guardian-enterprise.powerbyte.app"
  prod: "https://marine-guardian-enterprise.powerbyte.app"

environments:
  - dev
  - stage
  - prod

# ─────────────────────────────────────────────────────────
# MONOREPO APPS
# ─────────────────────────────────────────────────────────
apps:
  - name: marine-guardian-enterprise
    type: nextjs
    framework: nextjs
    router: app_router
    port: 3000
    description: Web management dashboard for LGU and BA users. BlueSentinel incident monitoring is a module within this app.

  - name: bluesentinel-mobile
    type: mobile
    framework: expo
    workflow: managed
    platforms:
      - ios
      - android
    distribution: app_store_play_store
    description: Field patrol companion app for LGU Patrollers and BA Rangers. Offline-first.

  - name: worker
    type: node
    description: Standalone BullMQ background job processor. Imports queue and worker definitions from packages/jobs.
    entry: src/index.ts

# ─────────────────────────────────────────────────────────
# MONOREPO PACKAGES
# ─────────────────────────────────────────────────────────
packages:
  - shared      # TypeScript interfaces + Zod schemas for all entities
  - db          # Prisma schema, migrations, repository layer, RLS, audit
  - api-client  # Typed tRPC client used by all apps
  - ui          # shadcn/ui + Tailwind (web); React Native Reusables + NativeWind (mobile)
  - jobs        # BullMQ queue definitions, worker implementations, DLQ helpers
  - storage     # Typed MinIO/S3/R2 wrapper

# ─────────────────────────────────────────────────────────
# TECH STACK
# ─────────────────────────────────────────────────────────
tech_stack:
  frontend: nextjs
  api: trpc
  orm: prisma

  auth:
    web: authjs_v5           # Auth.js (NextAuth v5) — cookie-based SameSite=Lax sessions
    mobile: custom_jwt_bearer # Short-lived JWT (15 min) + long-lived refresh token (30 days)

  database: postgresql

  connection_pooler:
    provider: pgbouncer
    mode: transaction
    per_lgu_tenant_limit: 10
    ba_cross_tenant_pool_limit: 5

  cache: valkey
  queue:
    provider: bullmq
    backend: valkey

  storage:
    dev: minio
    prod: s3_or_r2      # env-var swap only — zero code changes

  ui_web: shadcn_tailwind
  ui_mobile: react_native_reusables_nativewind

  realtime: sse_trpc_subscriptions
  offline_sync: watermelondb

  mobile_maps: react_native_maps

  email:
    dev: mailhog
    prod: ses

# ─────────────────────────────────────────────────────────
# SECURITY
# ─────────────────────────────────────────────────────────
security:
  # L2 — PostgreSQL RLS
  rls:
    enabled: true
    runtime_role: mg_app        # RLS enforced, NOT superuser, NO BYPASSRLS
    migration_role: mg_migrate  # BYPASSRLS — used only for migrations, never at runtime
    rls_tables:
      - Barangay
      - Fisherfolk
      - Vessel
      - Permit
      - CatchReport
      - Program
      - ProgramBeneficiary
      - DistributionEvent
      - Incident
      - Patrol
      - AuditLog
    exempt_tables:
      - Tenant
      - User
      - TenantMembership
      - Species
      - Notification
      - PushToken

  # L3 — RBAC
  rbac: true    # Role checked on every tRPC procedure before resolver runs

  # L5 — Audit
  audit_log:
    mode: immutable_inline    # Written synchronously before transaction commits
    cannot_be_deleted_by: all_roles

  # L6 — Prisma query guardrails
  query_guardrails: prisma_middleware    # Auto-injects tenantId; throws on missing

  # JWT session fields (web + mobile)
  jwt_fields:
    - userId
    - email
    - activeTenantId
    - activeTenantSlug
    - activeTenantType    # LGU | BlueAlliance
    - role

  # Multi-tenant login UX
  multi_tenant_login: auto_route_last_used_plus_nav_switcher

  # CORS
  cors:
    dev:
      - "http://localhost:3000"
      - "exp://"              # Expo dev client
    stage:
      - "https://stage.marine-guardian-enterprise.powerbyte.app"
    prod:
      - "https://marine-guardian-enterprise.powerbyte.app"

  # CSRF
  csrf: samesite_lax_authjs_default    # Mobile uses Bearer — not subject to CSRF

  # Rate limiting
  rate_limiting:
    public_per_ip_per_min: 20          # login, forgot-password, reset-password
    authenticated_per_user_per_min: 300
    upload_per_user_per_min: 10
    mobile_sync_per_device_per_min: 60

# ─────────────────────────────────────────────────────────
# ROLES
# ─────────────────────────────────────────────────────────
roles:
  - name: SUPER_ADMIN
    scope: LGU
    description: Full access within LGU tenant. Manage users, settings, all modules, approve/reject permits.

  - name: FISHERIES_OFFICER
    scope: LGU
    description: Register fisherfolk/vessels, permits, catch reports, programs. No user management.

  - name: ENCODER
    scope: LGU
    description: Create and edit fisherfolk and vessel records only.

  - name: VIEWER
    scope: LGU
    description: Read-only access to all records, dashboards, and reports. No mutations.

  - name: PATROLLER
    scope: LGU
    description: BlueSentinel mobile only. Create/submit incidents. Receive alerts. Offline-first.

  - name: BA_ADMIN
    scope: BlueAlliance
    description: Full BA workspace. Manage BA users, BA patrols/incidents, BA Operational Dashboard, Consolidated Cross-LGU Dashboard, tenant provisioning.

  - name: BA_ANALYST
    scope: BlueAlliance
    description: Read-only. BA Operational Dashboard and Consolidated Cross-LGU Dashboard only.

  - name: BA_RANGER
    scope: BlueAlliance
    description: BlueSentinel web + mobile for BA patrol operations. BA-scoped incidents only. No consolidated dashboard access.

# ─────────────────────────────────────────────────────────
# ENTITIES
# ─────────────────────────────────────────────────────────
entities:

  - name: Tenant
    tenanted: false
    rls: false
    fields:
      - { name: id,        type: String,     pk: true, default: cuid }
      - { name: name,      type: String }
      - { name: type,      type: TenantType, enum: [LGU, BlueAlliance] }
      - { name: slug,      type: String,     unique: true }
      - { name: logoUrl,   type: String,     nullable: true }
      - { name: isActive,  type: Boolean,    default: true }
      - { name: createdAt, type: DateTime,   default: now }
      - { name: updatedAt, type: DateTime,   updatedAt: true }

  - name: User
    tenanted: false
    rls: false
    fields:
      - { name: id,                type: String,  pk: true, default: cuid }
      - { name: email,             type: String,  unique: true }
      - { name: name,              type: String }
      - { name: passwordHash,      type: String }
      - { name: isActive,          type: Boolean, default: true }
      - { name: lastActiveTenantId, type: String, nullable: true, relation: Tenant }
      - { name: createdAt,         type: DateTime, default: now }
      - { name: updatedAt,         type: DateTime, updatedAt: true }

  - name: TenantMembership
    tenanted: false
    rls: false
    unique_constraints:
      - [userId, tenantId]
    fields:
      - { name: id,        type: String,   pk: true, default: cuid }
      - { name: userId,    type: String,   relation: User }
      - { name: tenantId,  type: String,   relation: Tenant }
      - { name: role,      type: Role,     enum: [SUPER_ADMIN, FISHERIES_OFFICER, ENCODER, VIEWER, PATROLLER, BA_ADMIN, BA_ANALYST, BA_RANGER] }
      - { name: isActive,  type: Boolean,  default: true }
      - { name: createdAt, type: DateTime, default: now }
      - { name: updatedAt, type: DateTime, updatedAt: true }

  - name: Barangay
    tenanted: true
    rls: true
    fields:
      - { name: id,        type: String,  pk: true, default: cuid }
      - { name: tenantId,  type: String,  relation: Tenant }
      - { name: name,      type: String }
      - { name: isActive,  type: Boolean, default: true }
      - { name: createdAt, type: DateTime, default: now }
    seed:
      trigger: on_lgu_tenant_creation
      dataset: calapan_62_barangays

  - name: Species
    tenanted: false
    rls: false
    fields:
      - { name: id,          type: String,  pk: true, default: cuid }
      - { name: name,        type: String }
      - { name: commonName,  type: String }
      - { name: rarity,      type: Rarity,  enum: [COMMON, UNCOMMON, RARE, ENDANGERED] }
      - { name: isGlobal,    type: Boolean, default: true }
      - { name: createdAt,   type: DateTime, default: now }
      - { name: updatedAt,   type: DateTime, updatedAt: true }

  - name: Fisherfolk
    tenanted: true
    rls: true
    fisherfolk_code:
      format: prefixed_sequential
      pattern: "{TENANT_SLUG_UPPER}-{NNNNNN}"
      example: "CALA-000123"
      sequence_scope: per_tenant
    fields:
      - { name: id,                 type: String,   pk: true, default: cuid }
      - { name: tenantId,           type: String,   relation: Tenant }
      - { name: fisherfolkCode,     type: String,   unique_per_tenant: true }
      - { name: firstName,          type: String }
      - { name: middleName,         type: String,   nullable: true }
      - { name: lastName,           type: String }
      - { name: dateOfBirth,        type: DateTime }
      - { name: sex,                type: Sex,      enum: [MALE, FEMALE] }
      - { name: barangayId,         type: String,   relation: Barangay }
      - { name: contactNumber,      type: String,   nullable: true }
      - { name: rsbsaNumber,        type: String,   nullable: true }
      - { name: activityCategories, type: "ActivityCategory[]", enum: [BOAT_OWNER_OPERATOR, CAPTURE_FISHING, GLEANING, VENDOR, FISH_PROCESSING, AQUACULTURE] }
      - { name: photoUrl,           type: String,   nullable: true }
      - { name: signatureUrl,       type: String,   nullable: true }
      - { name: isActive,           type: Boolean,  default: true }
      - { name: createdAt,          type: DateTime, default: now }
      - { name: updatedAt,          type: DateTime, updatedAt: true }

  - name: Vessel
    tenanted: true
    rls: true
    fields:
      - { name: id,                    type: String,     pk: true, default: cuid }
      - { name: tenantId,              type: String,     relation: Tenant }
      - { name: ownerId,               type: String,     relation: Fisherfolk }
      - { name: vesselName,            type: String }
      - { name: registrationNumber,    type: String }
      - { name: type,                  type: VesselType, enum: [MOTORIZED, NON_MOTORIZED] }
      - { name: lengthMeters,          type: Float,      nullable: true }
      - { name: tonnage,               type: Float,      nullable: true }
      - { name: gearType,              type: String,     nullable: true }
      - { name: homePortBarangayId,    type: String,     relation: Barangay }
      - { name: isActive,              type: Boolean,    default: true }
      - { name: createdAt,             type: DateTime,   default: now }
      - { name: updatedAt,             type: DateTime,   updatedAt: true }

  - name: Permit
    tenanted: true
    rls: true
    fields:
      - { name: id,              type: String,       pk: true, default: cuid }
      - { name: tenantId,        type: String,       relation: Tenant }
      - { name: vesselId,        type: String,       relation: Vessel }
      - { name: type,            type: PermitType,   enum: [FISHING_VESSEL, COMMERCIAL_FISHING] }
      - { name: status,          type: PermitStatus, enum: [DRAFT, SUBMITTED, UNDER_REVIEW, APPROVED, REJECTED, EXPIRED] }
      - { name: issuedAt,        type: DateTime,     nullable: true }
      - { name: expiresAt,       type: DateTime,     nullable: true }
      - { name: approvedById,    type: String,       nullable: true, relation: User }
      - { name: rejectionNotes,  type: String,       nullable: true }
      - { name: documentUrl,     type: String,       nullable: true }
      - { name: createdAt,       type: DateTime,     default: now }
      - { name: updatedAt,       type: DateTime,     updatedAt: true }

  - name: CatchReport
    tenanted: true
    rls: true
    fields:
      - { name: id,               type: String,   pk: true, default: cuid }
      - { name: tenantId,         type: String,   relation: Tenant }
      - { name: vesselId,         type: String,   relation: Vessel }
      - { name: fisherfolkId,     type: String,   relation: Fisherfolk }
      - { name: speciesId,        type: String,   nullable: true, relation: Species }
      - { name: speciesFreeText,  type: String,   nullable: true }
      - { name: catchVolumeKg,    type: Float }
      - { name: catchDate,        type: DateTime }
      - { name: landingLocation,  type: String }
      - { name: notes,            type: String,   nullable: true }
      - { name: createdAt,        type: DateTime, default: now }

  - name: Program
    tenanted: true
    rls: true
    fields:
      - { name: id,          type: String,      pk: true, default: cuid }
      - { name: tenantId,    type: String,      relation: Tenant }
      - { name: name,        type: String }
      - { name: type,        type: ProgramType, enum: [EQUIPMENT_DISTRIBUTION, LIVELIHOOD_SUBSIDY, TRAINING] }
      - { name: description, type: String,      nullable: true }
      - { name: startDate,   type: DateTime }
      - { name: endDate,     type: DateTime,    nullable: true }
      - { name: createdAt,   type: DateTime,    default: now }
      - { name: updatedAt,   type: DateTime,    updatedAt: true }

  - name: ProgramBeneficiary
    tenanted: false
    rls: true    # inherits tenant scope via programId → Program.tenantId
    unique_constraints:
      - [programId, fisherfolkId]
    fields:
      - { name: id,           type: String,   pk: true, default: cuid }
      - { name: programId,    type: String,   relation: Program }
      - { name: fisherfolkId, type: String,   relation: Fisherfolk }
      - { name: enrolledAt,   type: DateTime, default: now }

  - name: DistributionEvent
    tenanted: false
    rls: true    # inherits tenant scope via programId → Program.tenantId
    fields:
      - { name: id,               type: String,   pk: true, default: cuid }
      - { name: programId,        type: String,   relation: Program }
      - { name: fisherfolkId,     type: String,   relation: Fisherfolk }
      - { name: itemGiven,        type: String }
      - { name: quantity,         type: Int }
      - { name: distributionDate, type: DateTime }
      - { name: notes,            type: String,   nullable: true }
      - { name: createdAt,        type: DateTime, default: now }

  - name: Incident
    tenanted: true
    rls: true
    fields:
      - { name: id,            type: String,         pk: true, default: cuid }
      - { name: tenantId,      type: String,         relation: Tenant }
      - { name: reportedById,  type: String,         relation: User }
      - { name: violatorName,  type: String }
      - { name: violatorInfo,  type: String,         nullable: true }
      - { name: vesselId,      type: String,         nullable: true, relation: Vessel }
      - { name: gearUsed,      type: String,         nullable: true }
      - { name: latitude,      type: Float,          nullable: true }
      - { name: longitude,     type: Float,          nullable: true }
      - { name: incidentDate,  type: DateTime }
      - { name: description,   type: String }
      - { name: evidenceUrls,  type: "String[]" }
      - { name: status,        type: IncidentStatus, enum: [REPORTED, UNDER_INVESTIGATION, RESOLVED, DISMISSED] }
      - { name: createdAt,     type: DateTime,       default: now }
      - { name: updatedAt,     type: DateTime,       updatedAt: true }

  - name: Patrol
    tenanted: true
    rls: true
    fields:
      - { name: id,                  type: String,       pk: true, default: cuid }
      - { name: tenantId,            type: String,       relation: Tenant }
      - { name: vesselId,            type: String,       relation: Vessel }
      - { name: startedById,         type: String,       relation: User }
      - { name: startTime,           type: DateTime }
      - { name: endTime,             type: DateTime,     nullable: true }
      - { name: fuelConsumedLiters,  type: Float,        nullable: true }
      - { name: routeGeoJson,        type: Json,         nullable: true }
      - { name: notes,               type: String,       nullable: true }
      - { name: status,              type: PatrolStatus, enum: [IN_PROGRESS, COMPLETED, CANCELLED] }
      - { name: createdAt,           type: DateTime,     default: now }
      - { name: updatedAt,           type: DateTime,     updatedAt: true }

  - name: Notification
    tenanted: false
    rls: false
    fields:
      - { name: id,       type: String,              pk: true, default: cuid }
      - { name: userId,   type: String,              relation: User }
      - { name: type,     type: String }
      - { name: title,    type: String }
      - { name: body,     type: String }
      - { name: channel,  type: NotificationChannel, enum: [EMAIL, IN_APP] }
      - { name: isRead,   type: Boolean,             default: false }
      - { name: sentAt,   type: DateTime,            nullable: true }
      - { name: createdAt, type: DateTime,           default: now }

  - name: AuditLog
    tenanted: true
    rls: true
    immutable: true
    fields:
      - { name: id,        type: String,   pk: true, default: cuid }
      - { name: tenantId,  type: String,   nullable: true, relation: Tenant }
      - { name: userId,    type: String,   relation: User }
      - { name: action,    type: String }
      - { name: entity,    type: String }
      - { name: entityId,  type: String }
      - { name: before,    type: Json,     nullable: true }
      - { name: after,     type: Json,     nullable: true }
      - { name: ipAddress, type: String,   nullable: true }
      - { name: createdAt, type: DateTime, default: now }

  - name: PushToken
    tenanted: false
    rls: false
    fields:
      - { name: id,        type: String,         pk: true, default: cuid }
      - { name: userId,    type: String,         relation: User }
      - { name: token,     type: String }
      - { name: platform,  type: MobilePlatform, enum: [ios, android] }
      - { name: createdAt, type: DateTime,       default: now }
      - { name: updatedAt, type: DateTime,       updatedAt: true }

  - name: RefreshToken
    tenanted: false
    rls: false
    fields:
      - { name: id,         type: String,         pk: true, default: cuid }
      - { name: userId,     type: String,         relation: User }
      - { name: tokenHash,  type: String }
      - { name: platform,   type: MobilePlatform, enum: [ios, android] }
      - { name: expiresAt,  type: DateTime }
      - { name: createdAt,  type: DateTime,       default: now }

# ─────────────────────────────────────────────────────────
# BACKGROUND JOBS
# ─────────────────────────────────────────────────────────
jobs:
  enabled: true
  provider: bullmq
  backend: valkey
  dlq_ui: true
  dlq_ui_roles: [SUPER_ADMIN, BA_ADMIN]

  queues:
    - name: image-optimization
      job: ImageOptimization
      trigger: fisherfolk_photo_or_signature_upload
      retry: 3
      backoff: exponential
      dlq: true
      dlq_behavior: preserve_original_notify_staff

    - name: permit-pdf
      job: PermitPdfGeneration
      trigger: permit_approved
      retry: 3
      backoff: exponential
      dlq: true
      dlq_behavior: permit_remains_approved_notify_staff

    - name: idcard-pdf
      job: IdCardPdfGeneration
      trigger: on_demand_via_tRPC_mutation
      delivery: synchronous      # PDF generated in-request; browser download starts immediately
      retry: 3
      dlq: true
      dlq_behavior: notify_staff_retry_from_profile

    - name: permit-expiry
      job: PermitExpiryCheck
      trigger: cron
      cron: "0 0 * * *"    # daily at midnight
      retry: 1
      dlq: false
      log_results_to: AuditLog

    - name: notification-dispatch
      job: NotificationDispatch
      trigger: permit_decision_or_program_enrollment_or_incident_alert
      retry: 3
      backoff: exponential
      dlq: true
      dlq_behavior: log_failure_non_blocking

    - name: offline-sync
      job: OfflineSyncProcessing
      trigger: mobile_reconnect_batch_upload
      retry: 3
      backoff: exponential
      dlq: true
      dlq_behavior: flag_for_supervisor_review

    - name: evidence-photo
      job: EvidencePhotoProcessing
      trigger: mobile_incident_evidence_upload
      retry: 3
      backoff: exponential
      dlq: true
      dlq_behavior: partial_urls_saved_requeue_on_next_sync

  inline_jobs:
    - name: AuditLogWriter
      trigger: every_key_mutation
      sync: true
      rollback_parent_on_failure: true
      cannot_be_disabled: true

# ─────────────────────────────────────────────────────────
# FILE STORAGE
# ─────────────────────────────────────────────────────────
storage:
  enabled: true
  provider_dev: minio
  provider_prod: s3_or_r2
  upload_method: presigned_put

  buckets:
    - name: fisherfolk
      path_pattern: "{tenantSlug}/fisherfolk/{fisherfolkId}/{filename}"
      allowed_types: [jpeg, png]
      max_size_mb: 10
      store_original: false
      variants: single_optimized

    - name: permits
      path_pattern: "{tenantSlug}/permits/{permitId}/permit.pdf"
      type: pdf
      generated_by: PermitPdfGeneration

    - name: idcards
      path_pattern: "{tenantSlug}/idcards/{fisherfolkId}/idcard.pdf"
      type: pdf
      generated_by: IdCardPdfGeneration

    - name: incidents
      path_pattern: "{tenantSlug}/incidents/{incidentId}/evidence-{n}.jpg"
      allowed_types: [jpeg]
      max_size_mb: 10
      compressed_max_mb: 2
      max_per_incident: 5
      upload_method: presigned_put

# ─────────────────────────────────────────────────────────
# REALTIME
# ─────────────────────────────────────────────────────────
realtime:
  transport: sse_trpc_subscriptions
  channels:
    - name: dashboard.lguEvents
      scope: per_lgu_tenant
      trigger: any_tenant_mutation
      subscribers: [SUPER_ADMIN, FISHERIES_OFFICER, ENCODER, VIEWER]
      behavior: invalidation_event_client_refetches

    - name: dashboard.baOperationalEvents
      scope: ba_tenant_only
      trigger: ba_ranger_incident_or_patrol_completion
      subscribers: [BA_ADMIN, BA_ANALYST, BA_RANGER]

    - name: dashboard.consolidatedEvents
      scope: cross_tenant
      trigger: any_lgu_or_ba_data_change
      subscribers: [BA_ADMIN, BA_ANALYST]

    - name: bluesentinel.incidentAlerts
      scope: tenant_scoped
      trigger: incident_created_or_status_updated
      subscribers: [PATROLLER, BA_RANGER]
      scoping: patrollers_lgu_only_rangers_ba_only

# ─────────────────────────────────────────────────────────
# MOBILE
# ─────────────────────────────────────────────────────────
mobile:
  framework: expo
  workflow: managed
  platforms: [ios, android]
  distribution: app_store_play_store

  offline_first: true
  offline_storage: watermelondb
  offline_entities: [incidents, patrols, evidence_photos]
  conflict_resolution:
    status_fields: server_wins
    new_reports: device_wins

  push_notifications:
    provider: expo_push_service
    triggers:
      - new_incident_alert
      - incident_status_change
      - permit_decision
    token_registration: on_first_launch_after_login
    token_cleanup: on_logout_or_device_not_registered_error

  native_features:
    camera:
      provider: expo_camera
      image_manipulator: expo_image_manipulator
      max_photos_per_incident: 5
      compressed_max_mb_client_side: 2
    gps:
      provider: expo_location
      mode: background_task
      interval_seconds: 30
      route_format: "[longitude, latitude, timestamp][]"
    maps: react_native_maps
    biometrics:
      provider: expo_local_authentication
      use_case: app_reaccess_after_screen_lock
      note: does not replace login session

  auth:
    type: jwt_bearer
    access_token_ttl_minutes: 15
    access_token_storage: expo_secure_store
    refresh_token_ttl_days: 30
    refresh_rotation: sliding
    server_storage: RefreshToken_table    # tokenHash only; rotated on each use
    mobile_endpoint: /api/auth/mobile/refresh

  deep_linking: false

# ─────────────────────────────────────────────────────────
# ROUTING
# ─────────────────────────────────────────────────────────
routing:
  type: subdirectory
  tenant_slug_path_segment: 0    # first segment of /[slug]/...

  public_routes:
    - /login
    - /forgot-password
    - /reset-password

  protected_routes:
    - /[slug]/dashboard
    - /[slug]/fisherfolk
    - /[slug]/vessels
    - /[slug]/permits
    - /[slug]/catch
    - /[slug]/programs
    - /[slug]/bluesentinel
    - /[slug]/settings

  role_restricted_routes:
    - path: /[slug]/settings/users
      roles: [SUPER_ADMIN, BA_ADMIN]
    - path: /[slug]/settings/tenant
      roles: [SUPER_ADMIN, BA_ADMIN]
    - path: /[slug]/permits/approve
      roles: [SUPER_ADMIN, FISHERIES_OFFICER]
    - path: /bluealliance/consolidated
      roles: [BA_ADMIN, BA_ANALYST]
    - path: /bluealliance/tenants
      roles: [BA_ADMIN]

  tenant_boundary_enforcement: next_middleware_before_render
  navigation: hardcoded_role_visibility

# ─────────────────────────────────────────────────────────
# DASHBOARDS
# ─────────────────────────────────────────────────────────
dashboards:
  lgu_operational:
    realtime: true
    filters: [date_range, barangay]
    charts: [count_cards, line_charts, bar_charts, pie_donut_charts]
    export: none

  ba_operational:
    realtime: true
    scope: ba_tenant_only
    access: [BA_ADMIN, BA_ANALYST, BA_RANGER]
    charts: [count_cards, bar_charts, line_charts, map_markers, table]
    export: none

  consolidated_cross_lgu:
    realtime: true
    scope: cross_tenant
    access: [BA_ADMIN, BA_ANALYST]
    drill_down: true
    anomaly_flags: true
    charts: [count_cards, bar_charts, stacked_bar_charts, line_charts, table]
    export: none

# ─────────────────────────────────────────────────────────
# CSV EXPORT
# ─────────────────────────────────────────────────────────
csv_export:
  enabled: true
  tables:
    - fisherfolk    # BFAR reporting requirement
    - permits       # BFAR reporting requirement

# ─────────────────────────────────────────────────────────
# MODULES
# ─────────────────────────────────────────────────────────
modules:
  web:
    - name: fisherfolk_management
      roles: [SUPER_ADMIN, FISHERIES_OFFICER, ENCODER, VIEWER]
      csv_export: true
    - name: fisherfolk_id_card
      roles: [SUPER_ADMIN, FISHERIES_OFFICER]
    - name: vessel_management
      roles: [SUPER_ADMIN, FISHERIES_OFFICER, ENCODER, VIEWER]
    - name: permit_management
      roles: [SUPER_ADMIN, FISHERIES_OFFICER, ENCODER, VIEWER]
      csv_export: true
    - name: catch_monitoring
      roles: [SUPER_ADMIN, FISHERIES_OFFICER, VIEWER]
    - name: program_management
      roles: [SUPER_ADMIN, FISHERIES_OFFICER, VIEWER]
    - name: bluesentinel
      roles: [SUPER_ADMIN, FISHERIES_OFFICER, VIEWER, BA_ADMIN, BA_ANALYST, BA_RANGER]
    - name: tenant_management
      roles: [BA_ADMIN]
    - name: user_management
      roles: [SUPER_ADMIN, BA_ADMIN]
    - name: dlq_management
      roles: [SUPER_ADMIN, BA_ADMIN]
    - name: lgu_operational_dashboard
      roles: [SUPER_ADMIN, FISHERIES_OFFICER, ENCODER, VIEWER]
    - name: ba_operational_dashboard
      roles: [BA_ADMIN, BA_ANALYST, BA_RANGER]
    - name: consolidated_cross_lgu_dashboard
      roles: [BA_ADMIN, BA_ANALYST]

  mobile:
    - incident_reporting
    - patrol_logging
    - push_notifications
    - offline_sync

# ─────────────────────────────────────────────────────────
# FISHERFOLK CODE
# ─────────────────────────────────────────────────────────
fisherfolk_code:
  format: prefixed_sequential
  pattern: "{TENANT_SLUG_UPPER}-{NNNNNN}"
  example: "CALA-000123"
  sequence_scope: per_tenant
  padding: 6

