# ─────────────────────────────────────────────────────────
# COMPLIANCE
# ─────────────────────────────────────────────────────────
compliance:
  law: RA_10173    # Philippine Data Privacy Act
  pii_fields:
    - firstName
    - middleName
    - lastName
    - dateOfBirth
    - sex
    - barangayId
    - contactNumber
    - rsbsaNumber
    - photoUrl
    - signatureUrl
  sensitivity: high
  ba_cross_tenant_access: aggregated_non_pii_analytics_only
  data_retention: per_tenant_configurable
  individual_export_delete: deferred_future_phase

# ─────────────────────────────────────────────────────────
# INFRASTRUCTURE
# ─────────────────────────────────────────────────────────
deploy:
  k8s:
    enabled: false
    scaffold: placeholder_only

  compose:
    network_name: "${APP_NAME}_${ENV}_network"
    services:
      - postgres
      - pgbouncer
      - valkey
      - minio
      - mailhog
      - app
      - worker
    start_script: deploy/compose/start.sh

  aws_production:
    database: rds_postgresql
    storage: s3_or_cloudflare_r2
    cache_queue: elasticache_or_self_hosted_valkey
    email: ses
    pooler: pgbouncer_rds_sidecar_or_rds_proxy
