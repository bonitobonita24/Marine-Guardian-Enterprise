# Database services — PostgreSQL + PgBouncer
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: marine_guardian
      POSTGRES_USER: mg_migrate
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mg_migrate -d marine_guardian"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - marine_guardian_network

  pgbouncer:
    image: pgbouncer/pgbouncer:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://mg_migrate:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/marine_guardian
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 100
      DEFAULT_POOL_SIZE: 20
      MIN_POOL_SIZE: 5
      RESERVE_POOL_SIZE: 10
    ports:
      - "6432:5432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - marine_guardian_network

volumes:
  pg_data:

networks:
  marine_guardian_network:
    name: marine_guardian_dev_network
    driver: bridge
